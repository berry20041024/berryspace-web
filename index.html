<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berry's Space</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #313244;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #89b4fa;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>歡迎來到Berry's Space</h1>
        <p>網域連線測試成功！</p>
        <p>這是一塊全新的開發基地</p>
    </div>
</body>

</html>
