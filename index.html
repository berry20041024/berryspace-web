<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerrySpace - Discord Style Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- 左側：頻道列表欄 -->
        <div id="sidebar">
            <div class="server-header">
                <h2>🍓 BerrySpace</h2>
            </div>
            <div class="channel-section">
                <span class="section-title">文字頻道</span>
                <div id="channel-list">
                    <div class="channel-item active" data-channel="general"># general-大廳</div>
                    <div class="channel-item" data-channel="chat"># 🍿-閒聊</div>
                    <div class="channel-item" data-channel="games"># 🎮-遊戲</div>
                </div>
            </div>
            <!-- 使用者資訊區（底欄） -->
            <div class="user-footer">
                <div class="user-avatar">B</div>
                <div class="user-info">
                    <span class="username">BerryUser</span>
                    <span class="status">線上</span>
                </div>
            </div>
        </div>

        <!-- 右側：聊天主介面 -->
        <div id="chat-container">
            <!-- 聊天室頂欄 -->
            <div id="chat-header">
                <span id="current-channel-title"># general-大廳</span>
            </div>

            <!-- 訊息顯示區 -->
            <div id="message-container"></div>

            <!-- 訊息輸入區 -->
            <div id="input-area">
                <form id="message-form">
                    <input type="text" id="message-input" placeholder="傳送訊息到聊天室..." autocomplete="off" required>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK 模組對照表 -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <!-- 引入核心邏輯 -->
    <script type="module" src="script.js"></script>
</body>

</html>
