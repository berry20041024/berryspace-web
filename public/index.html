<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>BerrySpace - Roguelike Co-op</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Roguelike 升級選單樣式 */
        #upgrade-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upgrade-title {
            color: #ffcc00;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ffcc00;
        }

        .card-container {
            display: flex;
            gap: 25px;
        }

        .upgrade-card {
            width: 220px;
            height: 320px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .upgrade-card:hover {
            border-color: #00d4ff;
            transform: translateY(-15px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            background: #222;
        }

        .upgrade-card h3 {
            color: #00d4ff;
            font-size: 22px;
            margin: 15px 0;
        }

        .upgrade-card p {
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
        }

        .upgrade-card .icon {
            font-size: 40px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <div id="upgrade-overlay">
        <div class="upgrade-title">級別提升！選擇一項戰術強化</div>
        <div class="card-container" id="card-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
